<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor Geográfico — México</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link  href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/pmtiles@3.2.0/dist/pmtiles.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0ede8;
      --surface:    #e8e4dd;
      --surface2:   #dedad2;
      --border:     #ccc8c0;
      --ink:        #1a1814;
      --ink-muted:  #6b6760;
      --accent:     #2d5a3d;
      --accent-lt:  #4a8c62;
      --accent-dim: rgba(45,90,61,0.10);
      --accent-sel: rgba(45,90,61,0.18);
      --danger:     #8b3a3a;
    }

    html, body { height: 100%; font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); overflow: hidden; }
    #app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

    /* ── SIDEBAR ── */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }
    #sidebar-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .label-tiny { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 5px; }
    #sidebar-header h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 17px; line-height: 1.3; }
    #sidebar-header h1 em { font-style: italic; color: var(--accent); }

    /* tabs */
    #tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab-btn {
      flex: 1; height: 36px; background: none; border: none;
      border-bottom: 2px solid transparent;
      font-family: 'DM Mono', monospace; font-size: 9px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-muted); cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-panel.active { display: flex; }

    /* ── TAB CAPAS ── */
    #panel-capas { overflow-y: auto; }
    #panel-capas::-webkit-scrollbar { width: 4px; }
    #panel-capas::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .layer-group-header {
      padding: 8px 16px; font-size: 9px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--ink-muted);
      background: var(--surface2); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 1;
    }

    /* drag-and-drop layer items */
    .layer-item {
      padding: 10px 12px 10px 10px;
      border-bottom: 1px solid rgba(0,0,0,.05);
      cursor: default;
      transition: background .15s;
      user-select: none;
    }
    .layer-item.dragging { opacity: 0.4; background: var(--surface2); }
    .layer-item.drag-over { background: var(--accent-dim); border-top: 2px solid var(--accent); }

    .layer-item-top { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }

    /* drag handle */
    .drag-handle {
      display: flex; flex-direction: column; gap: 2.5px;
      cursor: grab; padding: 2px; flex-shrink: 0; opacity: 0.35;
      transition: opacity .15s;
    }
    .drag-handle:hover { opacity: 0.8; }
    .drag-handle span { display: block; width: 12px; height: 1.5px; background: var(--ink); border-radius: 1px; }

    .layer-checkbox {
      appearance: none; width: 14px; height: 14px;
      border: 1.5px solid var(--border); border-radius: 2px;
      cursor: pointer; flex-shrink: 0; position: relative;
      transition: background .12s, border-color .12s;
    }
    .layer-checkbox:checked { background: var(--accent); border-color: var(--accent); }
    .layer-checkbox:checked::after {
      content: ''; position: absolute; left: 3px; top: 1px;
      width: 5px; height: 8px; border: 1.5px solid #fff;
      border-top: none; border-left: none; transform: rotate(40deg);
    }
    .layer-name { font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .layer-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .layer-opacity-wrap { display: flex; align-items: center; gap: 8px; padding-left: 19px; }
    .layer-opacity-label { font-size: 9px; color: var(--ink-muted); width: 28px; flex-shrink: 0; }
    .layer-opacity {
      flex: 1; -webkit-appearance: none; height: 3px;
      background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
    }
    .layer-opacity::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }

    /* ── TAB FILTRO ── */
    #panel-filtro { overflow-y: auto; }
    #panel-filtro::-webkit-scrollbar { width: 4px; }
    #panel-filtro::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .filtro-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .filtro-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .filtro-section-header .label-tiny { margin-bottom: 0; }

    /* deselect button */
    .btn-deselect {
      display: none; background: none; border: none;
      font-family: 'DM Mono', monospace; font-size: 9px;
      color: var(--danger); cursor: pointer; padding: 2px 6px;
      border-radius: 2px; transition: background .1s;
      letter-spacing: 0.05em;
    }
    .btn-deselect.visible { display: block; }
    .btn-deselect:hover { background: rgba(139,58,58,.08); }

    #search-estado, #search-municipio {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; padding: 6px 10px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--ink); outline: none; margin-bottom: 6px;
    }
    #search-estado:focus, #search-municipio:focus { border-color: var(--accent); }

    .geo-list {
      max-height: 150px; overflow-y: auto;
      border: 1px solid var(--border); border-radius: 3px; background: var(--bg);
    }
    .geo-list::-webkit-scrollbar { width: 3px; }
    .geo-list::-webkit-scrollbar-thumb { background: var(--border); }

    .geo-item {
      padding: 7px 10px; font-size: 10px; cursor: pointer;
      border-left: 2px solid transparent; transition: background .1s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .geo-item:hover { background: var(--accent-dim); }
    .geo-item.active { background: var(--accent-sel); border-left-color: var(--accent); color: var(--accent); }
    .geo-item .geo-arrow { font-size: 9px; opacity: 0; transition: opacity .1s; color: var(--accent); }
    .geo-item:hover .geo-arrow, .geo-item.active .geo-arrow { opacity: 1; }

    .selected-badge {
      display: none; margin-top: 8px; padding: 5px 10px;
      background: var(--accent-sel); border-radius: 3px;
      font-size: 10px; color: var(--accent);
    }
    .selected-badge.visible { display: block; }

    /* municipios section disabled state */
    #section-municipio.disabled { opacity: 0.45; pointer-events: none; }
    #section-municipio .hint {
      font-size: 10px; color: var(--ink-muted); font-style: italic; margin-bottom: 8px;
    }

    .action-btns {
      padding: 12px 16px; display: flex; flex-direction: column;
      gap: 6px; border-bottom: 1px solid var(--border);
    }
    .btn {
      width: 100%; padding: 8px 12px; border: none; border-radius: 3px;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:not(:disabled):hover { background: var(--accent-lt); }
    .btn-secondary { background: var(--surface2); color: var(--ink); border: 1px solid var(--border); }
    .btn-secondary:not(:disabled):hover { background: var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); font-size: 9px; }
    .btn-danger:not(:disabled):hover { background: rgba(139,58,58,.08); }

    #clip-status { padding: 10px 16px; font-size: 10px; color: var(--ink-muted); font-style: italic; }

    /* ── MAP ── */
    #map { width: 100%; height: 100%; }
    #map-wrap { position: relative; width: 100%; height: 100%; overflow: hidden; }
    .maplibregl-popup-content {
      background: var(--ink); color: #fff; font-family: 'DM Mono', monospace;
      font-size: 11px; padding: 8px 12px; border-radius: 3px; max-width: 220px;
    }
    .maplibregl-popup-tip { border-top-color: var(--ink) !important; }
    .popup-title { font-weight: 500; margin-bottom: 3px; }
    .popup-sub { font-size: 9px; opacity: .6; }

    #loading {
      position: absolute; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: opacity .4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading span {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-muted); animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--ink); color: #fff; padding: 8px 16px;
      border-radius: 4px; font-size: 11px; opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── PANEL ATRIBUTOS ── */
    #attr-panel {
      position: absolute;
      top: 0; right: 0;
      width: 300px;
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 20;
      box-shadow: -4px 0 20px rgba(0,0,0,.08);
    }
    #attr-panel.open { transform: translateX(0); }

    #attr-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #attr-panel-title {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ink);
      margin-bottom: 2px;
    }
    #attr-panel-layer {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    #attr-panel-close {
      background: none; border: none;
      width: 28px; height: 28px;
      border-radius: 3px; font-size: 14px;
      color: var(--ink-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .12s, color .12s;
      margin-left: 8px;
    }
    #attr-panel-close:hover { background: var(--surface2); color: var(--ink); }

    #attr-table-wrap { flex: 1; overflow-y: auto; padding: 8px 0; }
    #attr-table-wrap::-webkit-scrollbar { width: 4px; }
    #attr-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .attr-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      border-bottom: 1px solid rgba(0,0,0,.04);
      min-height: 32px;
    }
    .attr-row:last-child { border-bottom: none; }
    .attr-key {
      padding: 8px 12px; font-size: 9px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-muted);
      background: var(--surface2); border-right: 1px solid var(--border);
      display: flex; align-items: center; word-break: break-all;
    }
    .attr-val {
      padding: 8px 12px; font-size: 11px; color: var(--ink);
      display: flex; align-items: center; word-break: break-word;
    }
    .attr-val.null { color: var(--ink-muted); font-style: italic; }

    #attr-panel-footer { padding: 10px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    #btn-copy-attrs {
      width: 100%; padding: 7px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase;
      cursor: pointer; color: var(--ink); transition: background .12s;
    }
    #btn-copy-attrs:hover { background: var(--border); }
    #map-wrap { position: relative; overflow: hidden; width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="loading"><span>Cargando mapa…</span></div>
<div id="toast"></div>

<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="label-tiny">Visor geográfico — lunadeformaggio</div>
      <h1>Delimitaciones<br><em>Políticas</em> — México</h1>
    </div>

    <div id="tabs">
      <button class="tab-btn active" data-tab="capas">Capas</button>
      <button class="tab-btn" data-tab="filtro">Filtrar / Recortar</button>
    </div>

    <!-- TAB CAPAS -->
    <div id="panel-capas" class="tab-panel active">
      <div class="layer-group-header">Orden y visibilidad — arrastra para reordenar</div>
      <div id="layers-list">
        <!-- generado dinámicamente -->
      </div>
    </div>

    <!-- TAB FILTRO -->
    <div id="panel-filtro" class="tab-panel">

      <!-- Estado -->
      <div class="filtro-section" id="section-estado">
        <div class="filtro-section-header">
          <div class="label-tiny">Estado</div>
          <button class="btn-deselect" id="desel-estado" title="Deseleccionar">✕ deseleccionar</button>
        </div>
        <input id="search-estado" type="text" placeholder="Buscar estado…" autocomplete="off" />
        <div class="geo-list" id="list-estados"></div>
        <div class="selected-badge" id="badge-estado"></div>
      </div>

      <!-- Municipio -->
      <div class="filtro-section disabled" id="section-municipio">
        <div class="filtro-section-header">
          <div class="label-tiny">Municipio <span style="opacity:.5">(opcional)</span></div>
          <button class="btn-deselect" id="desel-municipio" title="Deseleccionar">✕ deseleccionar</button>
        </div>
        <div class="hint" id="municipio-hint">Selecciona un estado primero</div>
        <input id="search-municipio" type="text" placeholder="Buscar municipio…" autocomplete="off" />
        <div class="geo-list" id="list-municipios"></div>
        <div class="selected-badge" id="badge-municipio"></div>
      </div>

      <!-- Acciones -->
      <div class="action-btns">
        <button class="btn btn-primary" id="btn-zoom" disabled>↗ Zoom al área</button>
        <button class="btn btn-primary" id="btn-clip" disabled>✂ Recortar capas visibles</button>
        <button class="btn btn-secondary" id="btn-download-clip" disabled>⬇ Descargar recorte (GeoJSON)</button>
        <button class="btn btn-danger" id="btn-reset">↺ Limpiar todo</button>
      </div>

      <div id="clip-status">Sin área seleccionada</div>
    </div>
  </aside>

  <div id="map-wrap">
    <div id="map"></div>
    <!-- PANEL ATRIBUTOS -->
    <div id="attr-panel">
      <div id="attr-panel-header">
        <div class="attr-meta">
          <div id="attr-panel-title">—</div>
          <div id="attr-panel-layer"></div>
        </div>
        <button id="attr-panel-close" title="Cerrar">✕</button>
      </div>
      <div id="attr-table-wrap">
        <div id="attr-table"></div>
      </div>
      <div id="attr-panel-footer">
        <button id="btn-copy-attrs">⧉ Copiar atributos</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIGURACIÓN DE CAPAS
//  type: 'polygon' | 'line' | 'point'
//  Para agregar capas nuevas, añade objetos a este array.
// ══════════════════════════════════════════════════════════════
const LAYERS = [
  {
    id:          'estados',
    label:       'Estados',
    url:         'pmtiles://data/Estados.pmtiles',
    sourceLayer: 'Estados',
    nameField:   'NOMGEO',
    type:        'polygon',
    color:       '#2d5a3d',
    lineOpacity: 0.85,
    lineWidth:   1.2
  },
  {
    id:          'municipios',
    label:       'Municipios',
    url:         'pmtiles://data/Municipios.pmtiles',
    sourceLayer: 'Municipios',
    nameField:   'NOMGEO',
    stateField:  'CVE_ENT',
    type:        'polygon',
    color:       '#5a7a8a',
    lineOpacity: 0.6,
    lineWidth:   0.5
  }
  // Ejemplos de capas adicionales:
  // { id:'carreteras', label:'Carreteras', url:'pmtiles://data/Carreteras.pmtiles',
  //   sourceLayer:'Carreteras', nameField:'NOMBRE', type:'line',
  //   color:'#8b6914', lineOpacity:0.8, lineWidth:1.5 }
  //
  // { id:'localidades', label:'Localidades', url:'pmtiles://data/Localidades.pmtiles',
  //   sourceLayer:'Localidades', nameField:'NOMGEO', type:'point',
  //   color:'#8b3a3a', fillOpacity:0.8 }
];

// ══════════════════════════════════════════════════════════════
//  ESTADO DE LA APP
// ══════════════════════════════════════════════════════════════
const state = {
  selectedEstado:    null,
  selectedMunicipio: null,
  selectedCVE_ENT:   null,
  clippedData:       {},
  layerOrder:        LAYERS.map(l => l.id)   // orden actual (primero = más abajo en mapa)
};

// ══════════════════════════════════════════════════════════════
//  MAPA
// ══════════════════════════════════════════════════════════════
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile);

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
    sources: {
      carto: {
        type: 'raster',
        tiles: ['https://a.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© OpenStreetMap © CARTO'
      }
    },
    layers: [{ id: 'carto-base', type: 'raster', source: 'carto', paint: { 'raster-opacity': 0.55 } }]
  },
  center: [-102.5, 23.5],
  zoom: 4.5,
  minZoom: 3,
  maxZoom: 16
});

map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 8 });

// ══════════════════════════════════════════════════════════════
//  CARGAR CAPAS AL MAPA
// ══════════════════════════════════════════════════════════════
map.on('load', () => {
  LAYERS.forEach(cfg => addLayerToMap(cfg));
  buildLayerList();

  map.on('sourcedata', onSourceData);
  document.getElementById('loading').classList.add('hidden');
});

function addLayerToMap(cfg) {
  if (map.getSource(cfg.id)) return;
  map.addSource(cfg.id, { type: 'vector', url: cfg.url });

  if (cfg.type === 'polygon') {
    // Relleno invisible — solo para capturar eventos de mouse en toda el área
    map.addLayer({ id: `${cfg.id}-fill-hit`, type: 'fill', source: cfg.id,
      'source-layer': cfg.sourceLayer,
      paint: { 'fill-color': cfg.color, 'fill-opacity': 0 }
    });
    // Relleno hover (temporal, visible)
    map.addLayer({ id: `${cfg.id}-hover`, type: 'fill', source: cfg.id,
      'source-layer': cfg.sourceLayer,
      filter: ['==', cfg.nameField, '___none___'],
      paint: { 'fill-color': cfg.color, 'fill-opacity': 0.2 }
    });
    // Relleno selección
    map.addLayer({ id: `${cfg.id}-fill-selected`, type: 'fill', source: cfg.id,
      'source-layer': cfg.sourceLayer,
      filter: ['==', cfg.nameField, '___none___'],
      paint: { 'fill-color': cfg.color, 'fill-opacity': 0.25 }
    });
    // Borde
    map.addLayer({ id: `${cfg.id}-line`, type: 'line', source: cfg.id,
      'source-layer': cfg.sourceLayer,
      paint: { 'line-color': cfg.color, 'line-width': cfg.lineWidth ?? 1, 'line-opacity': cfg.lineOpacity ?? 0.7 }
    });

    // Eventos sobre la capa hit (relleno invisible)
    map.on('mousemove', `${cfg.id}-fill-hit`, (e) => {
      if (!e.features.length) return;
      // Si hay un municipio seleccionado, no mostrar hover en estados ni otros municipios
      if (cfg.id === 'estados' && state.selectedEstado) return;
      if (cfg.id === 'municipios' && state.selectedMunicipio) return;
      map.getCanvas().style.cursor = 'pointer';
      const name = e.features[0].properties[cfg.nameField] ?? '—';
      map.setFilter(`${cfg.id}-hover`, ['==', cfg.nameField, name]);
      popup.setLngLat(e.lngLat)
        .setHTML(`<div class="popup-title">${name}</div><div class="popup-sub">${cfg.label}</div>`)
        .addTo(map);
    });
    map.on('mouseleave', `${cfg.id}-fill-hit`, () => {
      map.getCanvas().style.cursor = '';
      map.setFilter(`${cfg.id}-hover`, ['==', cfg.nameField, '___none___']);
      popup.remove();
    });
    map.on('click', `${cfg.id}-fill-hit`, (e) => {
      if (!e.features.length) return;
      const props = e.features[0].properties;
      const name  = props[cfg.nameField];
      // skipZoom=true: no mover la pantalla al hacer clic directo en el mapa
      if (cfg.id === 'estados') selectEstado(name, true);
      else if (cfg.id === 'municipios' && state.selectedEstado) selectMunicipio(name, true);
      // Abrir tabla de atributos
      openAttrPanel(props, cfg.label, name);
    });

  } else if (cfg.type === 'line') {
    map.addLayer({ id: `${cfg.id}-line`, type: 'line', source: cfg.id,
      'source-layer': cfg.sourceLayer,
      paint: { 'line-color': cfg.color, 'line-width': cfg.lineWidth ?? 1.2, 'line-opacity': cfg.lineOpacity ?? 0.8 }
    });
    map.on('click', `${cfg.id}-line`, (e) => {
      if (!e.features.length) return;
      const props = e.features[0].properties;
      openAttrPanel(props, cfg.label, props[cfg.nameField] ?? '—');
    });
    map.on('mousemove', `${cfg.id}-line`, (e) => {
      if (e.features.length) map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', `${cfg.id}-line`, () => { map.getCanvas().style.cursor = ''; });
  } else if (cfg.type === 'point') {
    map.addLayer({ id: `${cfg.id}-circle`, type: 'circle', source: cfg.id,
      'source-layer': cfg.sourceLayer,
      paint: {
        'circle-color': cfg.color, 'circle-radius': 4,
        'circle-opacity': cfg.fillOpacity ?? 0.8,
        'circle-stroke-color': '#fff', 'circle-stroke-width': 0.8
      }
    });
    map.on('click', `${cfg.id}-circle`, (e) => {
      if (!e.features.length) return;
      const props = e.features[0].properties;
      openAttrPanel(props, cfg.label, props[cfg.nameField] ?? '—');
    });
    map.on('mousemove', `${cfg.id}-circle`, (e) => {
      if (e.features.length) map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', `${cfg.id}-circle`, () => { map.getCanvas().style.cursor = ''; });
  }
}

// ══════════════════════════════════════════════════════════════
//  CONSTRUIR LISTA DE CAPAS (con drag & drop)
// ══════════════════════════════════════════════════════════════
function buildLayerList() {
  const container = document.getElementById('layers-list');
  container.innerHTML = '';

  // Mostramos en orden inverso: el primero en la lista = encima en el mapa
  [...state.layerOrder].reverse().forEach(id => {
    const cfg = LAYERS.find(l => l.id === id);
    if (!cfg) return;

    const item = document.createElement('div');
    item.className = 'layer-item';
    item.draggable = true;
    item.dataset.id = cfg.id;

    item.innerHTML = `
      <div class="layer-item-top">
        <div class="drag-handle" title="Arrastra para reordenar">
          <span></span><span></span><span></span>
        </div>
        <input type="checkbox" class="layer-checkbox" id="chk-${cfg.id}" checked />
        <span class="layer-color-dot" style="background:${cfg.color}"></span>
        <label class="layer-name" for="chk-${cfg.id}">${cfg.label}</label>
      </div>
      <div class="layer-opacity-wrap">
        <span class="layer-opacity-label" id="lbl-op-${cfg.id}">100%</span>
        <input type="range" class="layer-opacity" id="op-${cfg.id}" min="0" max="100" value="100" />
      </div>`;

    container.appendChild(item);
    bindLayerControls(cfg, item);
    bindDragEvents(item);
  });
}

// ══════════════════════════════════════════════════════════════
//  BIND CONTROLES DE CAPA
// ══════════════════════════════════════════════════════════════
function bindLayerControls(cfg, item) {
  const chk    = item.querySelector(`#chk-${cfg.id}`);
  const slider = item.querySelector(`#op-${cfg.id}`);
  const label  = item.querySelector(`#lbl-op-${cfg.id}`);

  const mapLayerIds = [`${cfg.id}-fill-hit`, `${cfg.id}-hover`, `${cfg.id}-fill-selected`,
                       `${cfg.id}-line`, `${cfg.id}-circle`];

  chk.addEventListener('change', () => {
    const vis = chk.checked ? 'visible' : 'none';
    mapLayerIds.forEach(lid => { if (map.getLayer(lid)) map.setLayoutProperty(lid, 'visibility', vis); });
  });

  slider.addEventListener('input', () => {
    const v = parseInt(slider.value) / 100;
    label.textContent = `${slider.value}%`;
    if (cfg.type === 'polygon') {
      if (map.getLayer(`${cfg.id}-line`))
        map.setPaintProperty(`${cfg.id}-line`, 'line-opacity', (cfg.lineOpacity ?? 0.7) * v);
    } else if (cfg.type === 'line') {
      if (map.getLayer(`${cfg.id}-line`))
        map.setPaintProperty(`${cfg.id}-line`, 'line-opacity', (cfg.lineOpacity ?? 0.8) * v);
    } else if (cfg.type === 'point') {
      if (map.getLayer(`${cfg.id}-circle`))
        map.setPaintProperty(`${cfg.id}-circle`, 'circle-opacity', (cfg.fillOpacity ?? 0.8) * v);
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  DRAG & DROP para reordenar capas
// ══════════════════════════════════════════════════════════════
let dragSrc = null;

function bindDragEvents(item) {
  item.addEventListener('dragstart', (e) => {
    dragSrc = item;
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  item.addEventListener('dragend', () => {
    item.classList.remove('dragging');
    document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('drag-over'));
  });
  item.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('drag-over'));
    if (item !== dragSrc) item.classList.add('drag-over');
  });
  item.addEventListener('drop', (e) => {
    e.preventDefault();
    if (!dragSrc || dragSrc === item) return;
    item.classList.remove('drag-over');

    const srcId  = dragSrc.dataset.id;
    const destId = item.dataset.id;

    // Reordenar en el DOM
    const container = document.getElementById('layers-list');
    const items = [...container.querySelectorAll('.layer-item')];
    const srcIdx  = items.findIndex(el => el.dataset.id === srcId);
    const destIdx = items.findIndex(el => el.dataset.id === destId);

    if (srcIdx < destIdx) {
      container.insertBefore(dragSrc, item.nextSibling);
    } else {
      container.insertBefore(dragSrc, item);
    }

    // Reordenar en el mapa
    // El orden visual de la lista: primero = encima en mapa
    // El orden en el mapa (MapLibre): las capas agregadas después están encima
    applyLayerOrder();
  });
}

function applyLayerOrder() {
  // Leer orden actual del DOM (primero en lista = encima en mapa)
  const listItems = [...document.querySelectorAll('#layers-list .layer-item')];
  // Invertir: el último de la lista va primero en el mapa (abajo)
  const orderedIds = listItems.map(el => el.dataset.id).reverse();
  state.layerOrder = orderedIds;

  // Mover capas en MapLibre para reflejar el nuevo orden
  // Subimos cada grupo de capas en el orden correcto
  orderedIds.forEach((id, idx) => {
    const cfg = LAYERS.find(l => l.id === id);
    if (!cfg) return;
    const layerIds = [`${id}-fill-hit`, `${id}-hover`, `${id}-fill-selected`, `${id}-line`, `${id}-circle`]
      .filter(lid => map.getLayer(lid));

    // Mover todas las sublayers de esta capa por encima de las anteriores
    layerIds.forEach(lid => {
      // moveLayer sin segundo argumento mueve al tope
      // Para respetar orden entre capas, movemos por encima del grupo anterior
      if (idx === orderedIds.length - 1) {
        // La capa más alta: al tope
        map.moveLayer(lid);
      } else {
        // Mover por debajo de la capa superior
        const nextId = orderedIds[idx + 1];
        const nextFirstLayer = [`${nextId}-fill-hit`, `${nextId}-hover`, `${nextId}-fill-selected`, `${nextId}-line`, `${nextId}-circle`]
          .find(lid2 => map.getLayer(lid2));
        if (nextFirstLayer) map.moveLayer(lid, nextFirstLayer);
      }
    });
  });
}

// ══════════════════════════════════════════════════════════════
let allEstados = [];
let estadosLoaded = false;

function onSourceData(e) {
  if (e.sourceId !== 'estados' || !e.isSourceLoaded || estadosLoaded) return;
  const cfg   = LAYERS.find(l => l.id === 'estados');
  const feats = map.querySourceFeatures('estados', { sourceLayer: cfg.sourceLayer });
  const nombres = [...new Set(feats.map(f => f.properties[cfg.nameField]))].filter(Boolean).sort();
  if (nombres.length > 0) {
    allEstados = nombres;
    estadosLoaded = true;
    renderGeoList('list-estados', nombres, selectEstado);
  }
}

// ══════════════════════════════════════════════════════════════
//  RENDER LISTA
// ══════════════════════════════════════════════════════════════
function renderGeoList(containerId, items, onSelect, activeItem = null) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  if (!items.length) {
    container.innerHTML = '<div class="geo-item" style="color:var(--ink-muted);cursor:default">Sin resultados</div>';
    return;
  }
  items.forEach(name => {
    const el = document.createElement('div');
    el.className = 'geo-item' + (name === activeItem ? ' active' : '');
    el.dataset.name = name;
    el.innerHTML = `<span>${name}</span><span class="geo-arrow">→</span>`;
    el.addEventListener('click', () => onSelect(name));
    container.appendChild(el);
  });
}

// ══════════════════════════════════════════════════════════════
//  SELECCIONAR ESTADO
// ══════════════════════════════════════════════════════════════
function selectEstado(nombre, skipZoom = false) {
  state.selectedEstado    = nombre;
  state.selectedMunicipio = null;
  state.clippedData       = {};

  const cfg = LAYERS.find(l => l.id === 'estados');
  map.setFilter('estados-fill-selected', ['==', cfg.nameField, nombre]);

  // Limpiar selección de municipio
  if (map.getLayer('municipios-fill-selected'))
    map.setFilter('municipios-fill-selected', ['==', 'NOMGEO', '___none___']);

  // Restaurar visibilidad total de municipios (por si había filtro previo)
  restoreMunicipiosVisibility();

  // Limpiar hover residual
  if (map.getLayer('estados-hover'))
    map.setFilter('estados-hover', ['==', 'NOMGEO', '___none___']);
  popup.remove();

  setBadge('badge-estado', nombre);
  setBadge('badge-municipio', null);
  highlightList('list-estados', nombre);
  showDeselect('desel-estado', true);
  showDeselect('desel-municipio', false);

  // Habilitar sección de municipios
  document.getElementById('section-municipio').classList.remove('disabled');
  document.getElementById('municipio-hint').style.display = 'none';

  if (!skipZoom) zoomToFeatures('estados', cfg.sourceLayer, cfg.nameField, nombre);
  loadMunicipios(nombre);
  updateButtons();
  setClipStatus(`Área: ${nombre}`);
}

//  DESELECCIONAR ESTADO

  restoreMunicipiosVisibility();

  setBadge('badge-municipio', null);
  showDeselect('desel-estado', false);
  showDeselect('desel-municipio', false);

// ══════════════════════════════════════════════════════════════
//  CARGAR MUNICIPIOS DEL ESTADO
// ══════════════════════════════════════════════════════════════
function loadMunicipios(nombreEstado) {
  const estadoCfg = LAYERS.find(l => l.id === 'estados');
  const munCfg    = LAYERS.find(l => l.id === 'municipios');
  if (!munCfg) return;

  const feats = map.querySourceFeatures('estados', { sourceLayer: estadoCfg.sourceLayer })
    .filter(f => f.properties[estadoCfg.nameField] === nombreEstado);

  if (feats.length) {
    const cve = feats[0].properties['CVE_ENT'];
    state.selectedCVE_ENT = cve;
  }

  setTimeout(() => {
    const mFeats  = map.querySourceFeatures('municipios', { sourceLayer: munCfg.sourceLayer });
    // Filtrar por CVE_ENT del estado seleccionado
    const filtered = state.selectedCVE_ENT
      ? mFeats.filter(f => String(f.properties[munCfg.stateField ?? 'CVE_ENT']) === String(state.selectedCVE_ENT))
      : mFeats;
    const nombres = [...new Set(filtered.map(f => f.properties[munCfg.nameField]))].filter(Boolean).sort();
    renderGeoList('list-municipios', nombres, selectMunicipio);
  }, 900);
}

// ══════════════════════════════════════════════════════════════
//  SELECCIONAR MUNICIPIO — oculta los demás
// ══════════════════════════════════════════════════════════════
function selectMunicipio(nombre, skipZoom = false) {
  state.selectedMunicipio = nombre;
  state.clippedData = {};

  const munCfg = LAYERS.find(l => l.id === 'municipios');
  if (!munCfg) return;

  // Resaltar selección
  if (map.getLayer('municipios-fill-selected'))
    map.setFilter('municipios-fill-selected', ['==', munCfg.nameField, nombre]);

  // Ocultar todos los demás municipios — solo mostrar el seleccionado
  const showFilter = ['==', munCfg.nameField, nombre];
  if (map.getLayer('municipios-line'))
    map.setFilter('municipios-line', showFilter);
  if (map.getLayer('municipios-fill-hit'))
    map.setFilter('municipios-fill-hit', showFilter);

  // Limpiar hover inmediatamente para que no quede sombra residual
  if (map.getLayer('municipios-hover'))
    map.setFilter('municipios-hover', ['==', munCfg.nameField, '___none___']);
  if (map.getLayer('estados-hover'))
    map.setFilter('estados-hover', ['==', 'NOMGEO', '___none___']);
  popup.remove();

  setBadge('badge-municipio', nombre);
  highlightList('list-municipios', nombre);
  showDeselect('desel-municipio', true);

  if (!skipZoom) zoomToFeatures('municipios', munCfg.sourceLayer, munCfg.nameField, nombre);
  updateButtons();
  setClipStatus(`Área: ${nombre} — ${state.selectedEstado}`);
}

document.getElementById('desel-municipio').addEventListener('click', () => {
  clearMunicipio();

function clearMunicipio() {
  state.selectedMunicipio = null;
  state.clippedData = {};

  if (map.getLayer('municipios-fill-selected'))
    map.setFilter('municipios-fill-selected', ['==', 'NOMGEO', '___none___']);

  restoreMunicipiosVisibility();

  setBadge('badge-municipio', null);
  showDeselect('desel-municipio', false);
  highlightList('list-municipios', null);

  if (state.selectedEstado) {

// ══════════════════════════════════════════════════════════════
//  RESTAURAR VISIBILIDAD DE MUNICIPIOS
// ══════════════════════════════════════════════════════════════
function restoreMunicipiosVisibility() {
  // Quitar todos los filtros de línea, hover y hit de municipios
  if (map.getLayer('municipios-line'))     map.setFilter('municipios-line',     null);
  if (map.getLayer('municipios-hover'))    map.setFilter('municipios-hover',    null);
  if (map.getLayer('municipios-fill-hit')) map.setFilter('municipios-fill-hit', null);
}

// ══════════════════════════════════════════════════════════════
//  ZOOM A FEATURES
// ══════════════════════════════════════════════════════════════
function zoomToFeatures(sourceId, sourceLayer, field, value) {
  const feats = map.querySourceFeatures(sourceId, { sourceLayer })
    .filter(f => f.properties[field] === value);
  if (!feats.length) return;
  const bounds = new maplibregl.LngLatBounds();
  feats.forEach(f => {
    const flat = f.geometry.type === 'Polygon'
      ? f.geometry.coordinates.flat()
      : f.geometry.coordinates.flat(2);
    flat.forEach(c => bounds.extend(c));
  });
  if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 50, duration: 700 });
}

// ══════════════════════════════════════════════════════════════
//  BOTÓN ZOOM
// ══════════════════════════════════════════════════════════════
document.getElementById('btn-zoom').addEventListener('click', () => {
  if (state.selectedMunicipio) {
    const cfg = LAYERS.find(l => l.id === 'municipios');
    zoomToFeatures('municipios', cfg.sourceLayer, cfg.nameField, state.selectedMunicipio);
  } else if (state.selectedEstado) {
    const cfg = LAYERS.find(l => l.id === 'estados');
    zoomToFeatures('estados', cfg.sourceLayer, cfg.nameField, state.selectedEstado);
  }
});

// ══════════════════════════════════════════════════════════════
//  RECORTAR
// ══════════════════════════════════════════════════════════════
document.getElementById('btn-clip').addEventListener('click', () => {
  const maskCfgId = state.selectedMunicipio ? 'municipios' : 'estados';
  const maskName  = state.selectedMunicipio ?? state.selectedEstado;
  const maskCfg   = LAYERS.find(l => l.id === maskCfgId);

  const maskFeats = map.querySourceFeatures(maskCfgId, { sourceLayer: maskCfg.sourceLayer })
    .filter(f => f.properties[maskCfg.nameField] === maskName);

  if (!maskFeats.length) {
    toast('No se encontraron geometrías. Intenta hacer zoom al área primero.');
    return;
  }

  let mask;
  try {
    const fc = turf.featureCollection(maskFeats.map(f => turf.feature(f.geometry, {})));
    mask = fc.features.length > 1 ? turf.union(...fc.features) : fc.features[0];
  } catch(e) {
    mask = turf.feature(maskFeats[0].geometry, {});
  }

  state.clippedData = {};
  let total = 0;

  LAYERS.forEach(cfg => {
    const chk = document.querySelector(`#layers-list [data-id="${cfg.id}"] .layer-checkbox`);
    if (chk && !chk.checked) return;

    const feats = map.querySourceFeatures(cfg.id, { sourceLayer: cfg.sourceLayer });
    if (!feats.length) return;

    const clipped = [];
    feats.forEach(f => {
      try {
        const feat = turf.feature(f.geometry, f.properties);
        let result;
        if (cfg.type === 'point') {
          result = turf.booleanPointInPolygon(feat, mask) ? feat : null;
        } else {
          result = turf.intersect(feat, mask);
          if (result) result.properties = f.properties;
        }
        if (result) clipped.push(result);
      } catch(e) { /* geometría inválida */ }
    });

    if (clipped.length) {
      state.clippedData[cfg.id] = turf.featureCollection(clipped);
      total += clipped.length;
    }
  });

  document.getElementById('btn-download-clip').disabled = total === 0;
  setClipStatus(`✂ Recorte listo — ${total} elementos en ${Object.keys(state.clippedData).length} capa(s)`);
  toast(`Recorte completado: ${total} elementos`);
});

// ══════════════════════════════════════════════════════════════
//  DESCARGAR
// ══════════════════════════════════════════════════════════════
document.getElementById('btn-download-clip').addEventListener('click', () => {
  const areaName = norm(state.selectedMunicipio ?? state.selectedEstado ?? 'recorte').replace(/ /g, '_');
  const ids = Object.keys(state.clippedData);
  if (!ids.length) { toast('No hay datos recortados aún'); return; }
  ids.forEach(id => downloadGeoJSON(state.clippedData[id], `${id}_${areaName}`));
  if (ids.length > 1) toast(`Descargando ${ids.length} archivos…`);
});

function downloadGeoJSON(geojson, filename) {
  const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `${filename}.geojson`;
  a.click(); URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════════════════════
//  HELPERS UI
// ══════════════════════════════════════════════════════════════
function setBadge(id, text) {
  const el = document.getElementById(id);
  if (text) { el.textContent = text; el.classList.add('visible'); }
  else       { el.textContent = ''; el.classList.remove('visible'); }
}

function showDeselect(id, visible) {
  document.getElementById(id).classList.toggle('visible', visible);
}

function highlightList(containerId, name) {
  document.querySelectorAll(`#${containerId} .geo-item`).forEach(el => {
    el.classList.toggle('active', el.dataset.name === name);
  });
}

function updateButtons() {
  const has = !!state.selectedEstado;
  document.getElementById('btn-zoom').disabled = !has;
  document.getElementById('btn-clip').disabled = !has;
}

function setClipStatus(msg) {
  document.getElementById('clip-status').textContent = msg;
}

function norm(s) {
  return (s ?? '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ══════════════════════════════════════════════════════════════
//  TABLA DE ATRIBUTOS
// ══════════════════════════════════════════════════════════════
let lastAttrs = {};

function openAttrPanel(properties, layerLabel, featureName) {
  lastAttrs = properties;

  // Título y capa
  document.getElementById('attr-panel-title').textContent = featureName ?? '—';
  document.getElementById('attr-panel-layer').textContent = layerLabel;

  // Construir tabla — excluir campo interno de MapLibre
  const table = document.getElementById('attr-table');
  table.innerHTML = '';

  const skip = new Set(['_id']);
  Object.entries(properties).forEach(([key, val]) => {
    if (skip.has(key)) return;
    const row = document.createElement('div');
    row.className = 'attr-row';
    const isNull = val === null || val === undefined || val === '';
    row.innerHTML = `
      <div class="attr-key">${key}</div>
      <div class="attr-val${isNull ? ' null' : ''}">${isNull ? 'null' : val}</div>`;
    table.appendChild(row);
  });

  document.getElementById('attr-panel').classList.add('open');
}

function closeAttrPanel() {
  document.getElementById('attr-panel').classList.remove('open');
}

document.getElementById('attr-panel-close').addEventListener('click', closeAttrPanel);

// Copiar atributos como JSON
document.getElementById('btn-copy-attrs').addEventListener('click', () => {
  const text = JSON.stringify(lastAttrs, null, 2);
  navigator.clipboard.writeText(text).then(() => toast('Atributos copiados al portapapeles'));
});

// Cerrar con Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeAttrPanel();
});
</script>
